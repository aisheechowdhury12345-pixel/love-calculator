<!DOCTYPE html>
<html>
<head>
<title>Love Calculator 💘</title>

<style>
body{
text-align:center;
font-family:Arial;
margin-top:60px;
background:#ffe6f2;
}

input,select{
padding:10px;
margin:8px;
font-size:16px;
}

button{
padding:10px 20px;
background:#ff4d88;
color:white;
border:none;
font-size:16px;
cursor:pointer;
}

h1{
color:#ff1a75;
}
</style>

</head>

<body>

<h1>💘 Love Calculator 💘</h1>

<input id="name" placeholder="Your Name"><br>

<input id="crush" placeholder="Crush Name"><br>

<select id="zodiac">
<option>Aries</option>
<option>Taurus</option>
<option>Gemini</option>
<option>Cancer</option>
<option>Leo</option>
<option>Virgo</option>
<option>Libra</option>
<option>Scorpio</option>
<option>Sagittarius</option>
<option>Capricorn</option>
<option>Aquarius</option>
<option>Pisces</option>
</select>

<br><br>

<button onclick="calculate()">Check Love %</button>

<h2 id="result"></h2>

<script>

function stablePercentage(name,crush){

/* Make order same every time */
let pair=[name,crush].sort().join("");

let total=0;

for(let i=0;i<pair.length;i++){
total+=pair.charCodeAt(i);
}

return (total % 81)+20;

}

function calculate(){

let name=document.getElementById("name").value.toLowerCase().trim();
let crush=document.getElementById("crush").value.toLowerCase().trim();

let percent=stablePercentage(name,crush);

/* Special rule for your name */
if(name.includes("aishee") || crush.includes("aishee")){
percent=100;
}

document.getElementById("result").innerText=
"Compatibility: "+percent+"% ❤️";

}

</script>

</body>
</html>
